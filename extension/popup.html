<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fake News Detector</title>
    <style>
      /* ── Reset & base ─────────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
        width: 320px;
        min-height: 140px;
        margin: 0;
        padding: 16px;
        background: #ffffff;
        color: #111827;
      }

      /* ── Header ───────────────────────────────────────────────────────── */
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e5e7eb;
      }

      .header h1 {
        font-size: 0.95rem;
        font-weight: 600;
        margin: 0;
        color: #111827;
      }

      /* ── Loading state ────────────────────────────────────────────────── */
      #loading {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #6b7280;
        font-size: 0.875rem;
        font-style: italic;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid #d1d5db;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* ── Result state ─────────────────────────────────────────────────── */
      #result {
        display: none;
      }

      .label {
        font-size: 1.15rem;
        font-weight: 700;
        margin-bottom: 10px;
        letter-spacing: -0.01em;
      }

      .label.real {
        color: #15803d;
      }

      .label.fake {
        color: #dc2626;
      }

      /* Confidence bar */
      .confidence-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      .confidence-label {
        font-size: 0.8rem;
        color: #6b7280;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .confidence-bar-track {
        flex: 1;
        height: 6px;
        background: #e5e7eb;
        border-radius: 3px;
        overflow: hidden;
      }

      .confidence-bar-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.4s ease;
      }

      .confidence-bar-fill.real {
        background: #22c55e;
      }

      .confidence-bar-fill.fake {
        background: #ef4444;
      }

      .confidence-pct {
        font-size: 0.8rem;
        font-weight: 600;
        color: #374151;
        white-space: nowrap;
        flex-shrink: 0;
        min-width: 42px;
        text-align: right;
      }

      /* Explanation */
      .explanation {
        font-size: 0.8rem;
        color: #4b5563;
        line-height: 1.5;
        border-left: 3px solid #e5e7eb;
        padding-left: 8px;
        margin-top: 4px;
      }

      /* ── Error state ──────────────────────────────────────────────────── */
      #error {
        display: none;
        align-items: flex-start;
        gap: 8px;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 0.85rem;
        color: #991b1b;
        line-height: 1.45;
      }

      #error .error-icon {
        font-size: 1rem;
        flex-shrink: 0;
        margin-top: 1px;
      }

      #error-message {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <span aria-hidden="true">🔍</span>
      <h1>Fake News Detector</h1>
    </div>

    <!-- Loading state (shown by default) -->
    <div id="loading" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <span>Analyzing page…</span>
    </div>

    <!-- Result state (hidden until prediction arrives) -->
    <div id="result" role="region" aria-label="Analysis result">
      <div id="label" class="label"></div>
      <div class="confidence-row">
        <span class="confidence-label">Confidence</span>
        <div class="confidence-bar-track" role="progressbar"
             aria-valuemin="0" aria-valuemax="100" id="confidence-bar-container">
          <div id="confidence-bar" class="confidence-bar-fill"></div>
        </div>
        <span id="confidence-pct" class="confidence-pct"></span>
      </div>
      <div id="explanation" class="explanation"></div>
    </div>

    <!-- Error state (hidden until an error occurs) -->
    <div id="error" role="alert">
      <span class="error-icon" aria-hidden="true">⚠️</span>
      <span id="error-message"></span>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
